collection: setting
slug: indication
title: Hinweis
text: >-
  Liebe Patienten, seit Dez 2025 können wir auch ambulante Operationen in der
  Warnowklinik Bützow anbieten.  Dort steht uns freitags ein komplett
  modernisierter Operationssaal zur Verfügung in dem wir unsere Patienten mit
  Schulter-, Knie- und Handgelenkproblemen versorgen können. Alle Patienten
  werden selbstverständlich über unserer Sprechstunde auf die Operation
  vorbereitet. Somit können wir eine kontinuierliche Betreuung vom ersten
  Röntgenbild bis zum letzten Verbandswechsel sicherstellen.  Des Weitern können
  Sie Fragen zum organisatorischen Ablauf über das Kontaktformular auf unserer
  Homepage an uns richten.   

  Ihr Praxis-Team 
